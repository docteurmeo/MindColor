<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MindColor — Bạn nhớ màu brand giỏi tới đâu?</title>
  <meta name="description" content="Game đoán màu logo thương hiệu. Test xem mắt bạn có phải designer thực thụ không." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main id="app">
    <!-- Home Screen -->
    <section id="screen-home" class="screen active">
      <header class="home-header">
        <h1 class="logo">MindColor</h1>
        <p class="tagline">Bạn nhớ màu brand giỏi tới đâu?</p>
      </header>

      <div class="home-actions">
        <button class="btn btn-primary" data-action="play-classic">
          <span class="btn-title">Classic</span>
          <span class="btn-sub">10 brand ngẫu nhiên</span>
        </button>

        <button class="btn btn-secondary" data-action="play-daily" disabled>
          <span class="btn-title">Daily Challenge</span>
          <span class="btn-sub">Sắp ra mắt</span>
        </button>
      </div>

      <footer class="home-footer">
        <p>v0.2 — demo</p>
      </footer>
    </section>

    <!-- Round Screen -->
    <section id="screen-round" class="screen">
      <div class="round-top">
        <div class="round-progress" id="round-progress">1 / 10</div>
        <button class="link-btn" data-action="back-home">Thoát</button>
      </div>

      <div class="round-question">
        <p class="question-label">Màu chủ đạo của</p>
        <div class="brand-logo" id="brand-logo"></div>
        <h2 class="brand-name" id="brand-name">—</h2>
      </div>

      <div class="picker-wrap" id="picker-wrap">
        <div id="color-picker"></div>
        <div class="swatch-preview">
          <span class="swatch-label">Bạn chọn</span>
          <div class="swatch" id="user-swatch"></div>
          <code class="swatch-hex" id="user-hex">#000000</code>
        </div>
      </div>

      <button class="btn btn-primary" data-action="submit-color" id="submit-btn">
        <span class="btn-title">Submit</span>
      </button>

      <!-- Reveal -->
      <div class="reveal" id="reveal" hidden>
        <div class="score-wrap">
          <div class="score-big" id="score-big">0<span class="score-pct">%</span></div>
          <div class="score-bar">
            <div class="score-bar-fill" id="score-bar-fill"></div>
          </div>
          <p class="reaction" id="reaction">—</p>
        </div>

        <div class="compare">
          <div class="compare-col">
            <span class="compare-label">Bạn chọn</span>
            <div class="swatch swatch-lg" id="reveal-user"></div>
            <code class="swatch-hex" id="reveal-user-hex">—</code>
          </div>
          <div class="compare-col">
            <span class="compare-label">Brand</span>
            <div class="swatch swatch-lg" id="reveal-brand"></div>
            <code class="swatch-hex" id="reveal-brand-hex">—</code>
          </div>
        </div>

        <ul class="feedback" id="feedback"></ul>

        <button class="btn btn-primary" data-action="next-round" id="next-btn">
          <span class="btn-title">Tiếp theo →</span>
        </button>
      </div>
    </section>

    <!-- Final Screen -->
    <section id="screen-final" class="screen">
      <header class="final-header">
        <p class="final-eyebrow">Kết quả</p>
        <div class="final-score" id="final-score">0<span class="final-score-pct">%</span></div>
        <div class="final-rank">
          <span class="final-rank-emoji" id="final-rank-emoji">🎨</span>
          <span class="final-rank-label" id="final-rank-label">—</span>
        </div>
        <p class="final-comment" id="final-comment">—</p>
      </header>

      <section class="final-section">
        <h3 class="final-section-title">10 lượt vừa rồi</h3>
        <ul class="recap" id="recap"></ul>
      </section>

      <section class="final-section">
        <h3 class="final-section-title">Khoe thành tích</h3>
        <pre class="share-grid" id="share-grid">—</pre>
        <div class="share-actions">
          <button class="btn btn-secondary" data-action="copy-grid" id="copy-grid-btn">
            <span class="btn-title">📋 Copy text</span>
          </button>
          <button class="btn btn-secondary" data-action="download-card">
            <span class="btn-title">🖼️ Tải ảnh</span>
          </button>
        </div>
      </section>

      <div class="final-cta">
        <button class="btn btn-primary" data-action="play-again">
          <span class="btn-title">Chơi lại</span>
          <span class="btn-sub">10 brand mới ngẫu nhiên</span>
        </button>
        <button class="btn btn-secondary" data-action="back-home">
          <span class="btn-title">Về Home</span>
        </button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
  <script src="js/logo.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/share.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
