<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" id="meta-theme-color" />
  <title>MindColor — Bạn nhớ màu sắc của các brand giỏi tới đâu?</title>
  <meta name="description" content="Game đoán màu logo thương hiệu. Test xem mắt bạn có phải designer thực thụ không." />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    // Theme bootstrap — apply before paint to prevent FOUC
    (function(){
      try {
        var saved = localStorage.getItem("mc-theme");
        var prefers = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        var theme = saved || prefers;
        document.documentElement.setAttribute("data-theme", theme);
      } catch(e){}
    })();
  </script>
</head>
<body>
  <div id="safe-probe"></div>

  <!-- SVG mask dùng chung cho mọi knob: cutter circle (BLACK trong mask = hide)
       slide vào knob → khoét dần dần thành crescent. Animation áp vào class .mc-knob-cutter. -->
  <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
    <defs>
      <mask id="mc-knob-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="27" height="27">
        <rect width="27" height="27" fill="white"/>
        <circle class="mc-knob-cutter" cx="13.5" cy="13.5" r="13.5" fill="black"/>
      </mask>
      <!-- Hologram water displacement filter: subtle organic ripple along element edges.
           baseFrequency animated to make the noise pattern drift continuously. -->
      <filter id="mc-water" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" seed="4" result="noise">
          <animate attributeName="baseFrequency"
                   values="0.012 0.018; 0.015 0.022; 0.012 0.018"
                   dur="10s" repeatCount="indefinite"/>
          <animate attributeName="seed" values="4; 7; 4" dur="10s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="4"/>
      </filter>
    </defs>
  </svg>

  <!-- Theme toggle — Figma "Toggle Dark-Light mode" 60x31 -->
  <template id="tpl-theme-toggle">
    <button class="theme-toggle" data-action="toggle-theme" aria-label="Toggle dark mode" type="button">
      <span class="theme-toggle-track">
        <span class="theme-toggle-knob">
          <svg viewBox="0 0 27 27" width="27" height="27">
            <circle cx="13.5" cy="13.5" r="13.5" fill="#ffffff" mask="url(#mc-knob-mask)"/>
          </svg>
        </span>
        <span class="theme-toggle-label label-light" aria-hidden="true">Light</span>
        <span class="theme-toggle-label label-dark"  aria-hidden="true">Dark</span>
      </span>
    </button>
  </template>

  <!-- ============== HOME ============== -->
  <section id="screen-home" class="active">
    <header class="page-header home-header">
      <span class="page-header-spacer"></span>
      <span class="page-header-toggle" data-toggle-slot></span>
    </header>
    <div class="home-logo-svg home-logo-mobile  holo-logo holo-logo--mobile"  role="img" aria-label="MindColor"></div>
    <div class="home-logo-svg home-logo-desktop holo-logo holo-logo--desktop" role="img" aria-label="MindColor"></div>
    <p class="home-tagline">Bạn nhớ màu sắc của các brand<br/>giỏi tới đâu?</p>
    <div class="home-actions">
      <button class="btn-card btn-classic" data-action="play-classic">
        <span class="title">Classic</span>
        <span class="sub">10 brand ngẫu nhiên</span>
      </button>
      <button class="btn-card btn-daily" data-action="play-daily" disabled>
        <span class="title">Daily challenge</span>
        <span class="sub">Sắp ra mắt</span>
      </button>
    </div>
  </section>

  <main id="app">

    <!-- ============== ROUND ============== -->
    <section id="screen-round" class="screen">
      <div class="app-header">
        <span class="progress" id="round-progress">1/10</span>
        <span class="title" id="brand-name">—</span>
        <span class="page-header-toggle" data-toggle-slot></span>
      </div>

      <div class="brand-logo-large" id="brand-logo"></div>

      <div id="picker-stage">
        <div class="color-picker-wrap" id="color-picker"></div>
        <div class="hue-slider-wrap" id="hue-slider"></div>
        <button class="btn-cta" data-action="submit-color" id="submit-btn">Submit</button>
      </div>

      <div id="result-stage" hidden>
        <div class="result-score" id="score-big">0%</div>
        <div class="result-ruler"><div class="result-ruler-fill" id="score-bar-fill"></div></div>
        <p class="result-reaction" id="reaction">—</p>

        <div class="compare">
          <div class="compare-card">
            <div class="logo-wrap" id="reveal-user-logo"></div>
            <div class="swatch-bar" id="reveal-user-bar">
              <span class="swatch-hex" id="reveal-user-hex">—</span>
            </div>
            <div class="label">Bạn chọn</div>
          </div>
          <div class="compare-card">
            <div class="logo-wrap" id="reveal-brand-logo"></div>
            <div class="swatch-bar" id="reveal-brand-bar">
              <span class="swatch-hex" id="reveal-brand-hex">—</span>
            </div>
            <div class="label">Đáp án</div>
          </div>
        </div>

        <div class="result-feedback" id="feedback"></div>

        <button class="btn-cta" data-action="next-round">Next</button>
      </div>
    </section>

    <!-- ============== FINAL ============== -->
    <section id="screen-final" class="screen">
      <div class="app-header center-only">
        <span class="page-header-spacer"></span>
        <span class="title">MindColor</span>
        <span class="page-header-toggle" data-toggle-slot></span>
      </div>

      <div class="final-score holo-text" id="final-score">0%</div>

      <div class="final-rank-pill">
        <span id="final-rank-emoji">🎨</span>
        <span id="final-rank-label">—</span>
      </div>

      <p class="final-comment" id="final-comment">—</p>

      <ul class="recap" id="recap"></ul>

      <div class="final-actions">
        <button class="btn-cta-half btn-share" disabled>Share</button>
        <button class="btn-cta-half btn-again" data-action="back-home">Again?</button>
      </div>
    </section>
  </main>

  <!-- FX overlay (confetti, page-blur transitions) -->
  <div id="fx-confetti" aria-hidden="true"></div>
  <div id="fx-transition" aria-hidden="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
  <script src="js/logo.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/share.js"></script>
  <script src="js/game.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
