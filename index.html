<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MindColor — Bạn nhớ màu sắc của các brand giỏi tới đâu?</title>
  <meta name="description" content="Game đoán màu logo thương hiệu. Test xem mắt bạn có phải designer thực thụ không." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="safe-probe"></div>

  <!-- ============== HOME (viewport-native, ngoài frame scale) ============== -->
  <section id="screen-home" class="active">
    <img class="home-logo-svg" src="assets/mindcolor-logo.svg" alt="MindColor" />
    <p class="home-tagline">Bạn nhớ màu sắc của các brand<br/>giỏi tới đâu?</p>
    <div class="home-actions">
      <button class="btn-card btn-classic" data-action="play-classic">
        <span class="title">Classic</span>
        <span class="sub">10 brand ngẫu nhiên</span>
      </button>
      <button class="btn-card btn-daily" data-action="play-daily" disabled>
        <span class="title">Daily challenge</span>
        <span class="sub">Sắp ra mắt</span>
      </button>
    </div>
  </section>

  <main id="app">

    <!-- ============== ROUND (Step 1 + Step 2 Result) ============== -->
    <section id="screen-round" class="screen">
      <!-- Header -->
      <div class="app-header">
        <span class="progress" id="round-progress">1/10</span>
        <span class="title" id="brand-name">—</span>
      </div>

      <!-- Brand logo (idle gray → user-color preview → reveal answer) -->
      <div class="brand-logo-large" id="brand-logo"></div>

      <!-- ===== Step 1: Picker (hidden on reveal) ===== -->
      <div id="picker-stage">
        <div class="color-picker-wrap" id="color-picker"></div>
        <div class="hue-slider-wrap" id="hue-slider"></div>
        <button class="btn-cta" data-action="submit-color" id="submit-btn">Submit</button>
      </div>

      <!-- ===== Step 2: Result (hidden until submit) ===== -->
      <div id="result-stage" hidden>
        <div class="result-score" id="score-big">0%</div>
        <div class="result-ruler"><div class="result-ruler-fill" id="score-bar-fill"></div></div>
        <p class="result-reaction" id="reaction">—</p>

        <div class="compare">
          <div class="compare-card">
            <div class="logo-wrap" id="reveal-user-logo"></div>
            <div class="swatch-bar" id="reveal-user-bar">
              <span class="swatch-hex" id="reveal-user-hex">—</span>
            </div>
            <div class="label">Bạn chọn</div>
          </div>
          <div class="compare-card">
            <div class="logo-wrap" id="reveal-brand-logo"></div>
            <div class="swatch-bar" id="reveal-brand-bar">
              <span class="swatch-hex" id="reveal-brand-hex">—</span>
            </div>
            <div class="label">Đáp án</div>
          </div>
        </div>

        <div class="result-feedback" id="feedback"></div>

        <button class="btn-cta" data-action="next-round">Next</button>
      </div>
    </section>

    <!-- ============== FINAL ============== -->
    <section id="screen-final" class="screen">
      <div class="app-header center-only">
        <span class="title">MindColor</span>
      </div>

      <div class="final-score" id="final-score">0%</div>

      <div class="final-rank-pill">
        <span id="final-rank-emoji">🎨</span>
        <span id="final-rank-label">—</span>
      </div>

      <p class="final-comment" id="final-comment">—</p>

      <ul class="recap" id="recap"></ul>

      <div class="final-actions">
        <button class="btn-cta-half btn-share" disabled>Share</button>
        <button class="btn-cta-half btn-again" data-action="back-home">Again?</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
  <script src="js/logo.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/share.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
